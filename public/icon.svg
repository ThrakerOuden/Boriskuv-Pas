<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with deep black border for cartoony look matching the app's retro theme -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#FF6321" stroke="#000000" stroke-width="16"/>
  
  <!-- Passport Book Shape -->
  <rect x="120" y="90" width="272" height="340" rx="24" fill="#0E2F56" stroke="#000000" stroke-width="12"/>
  
  <!-- Golden/Yellow Passport emblem circle -->
  <circle cx="256" cy="240" r="64" fill="none" stroke="#FFD700" stroke-width="8" stroke-dasharray="16 8"/>
  
  <!-- Plane flying across emblem -->
  <path d="M220 220 L240 235 L280 215 L260 250 L285 270 L275 275 L245 260 L225 280 L225 265 L240 250 Z" fill="#FFD700"/>
  
  <!-- Cute stylized dog ears extending from passport top -->
  <path d="M140 90 C110 50, 80 120, 120 140 Z" fill="#000000"/>
  <path d="M372 90 C402 50, 432 120, 392 140 Z" fill="#000000"/>
  
  <!-- Golden text/lines on passport cover representing text -->
  <rect x="170" y="130" width="172" height="12" rx="6" fill="#FFD700"/>
  <rect x="200" y="155" width="112" height="8" rx="4" fill="#FFD700"/>
  
  <rect x="170" y="325" width="172" height="12" rx="6" fill="#FFD700"/>
  <rect x="185" y="350" width="142" height="8" rx="4" fill="#FFD700"/>
  <rect x="220" y="370" width="72" height="8" rx="4" fill="#FFD700"/>

  <!-- Playful puppy nose/muzzle overlapping center bottom of passport -->
  <g transform="translate(256, 300)">
    <!-- Paw print/Passport stamp -->
    <circle cx="0" cy="-10" r="14" fill="#FF6321" stroke="#000000" stroke-width="4"/>
    <circle cx="-16" cy="-22" r="7" fill="#FF6321" stroke="#000000" stroke-width="3"/>
    <circle cx="0" cy="-28" r="7" fill="#FF6321" stroke="#000000" stroke-width="3"/>
    <circle cx="16" cy="-22" r="7" fill="#FF6321" stroke="#000000" stroke-width="3"/>
  </g>
</svg>
