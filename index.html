<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Borískův Pas</title>
    
    <!-- PWA configuration link -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    
    <!-- iOS / Safari mobile web app meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Borískův Pas" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#FF6321" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker for PWA installation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('Borískův Pas: Service Worker úspěšně registrován!', reg.scope);
            })
            .catch((err) => {
              console.error('Borískův Pas: Registrace Service Workeru selhala:', err);
            });
        });
      }
    </script>
  </body>
</html>
